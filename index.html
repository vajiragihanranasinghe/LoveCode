<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LOVE CODE - Real GPS Distance Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0a0f1e, #0c1222);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
        }
        .container { max-width: 550px; margin: 0 auto; }
        .card {
            background: rgba(15, 23, 42, .95);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.8rem; background: linear-gradient(135deg, #ff6b6b, #ff6b9d); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #0f172a;
            border-radius: 60px;
            margin-bottom: 16px;
            font-size: 0.7rem;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .dot.green { background: #10b981; animation: pulse 1.5s infinite; }
        .dot.red { background: #ef4444; }
        .dot.yellow { background: #f59e0b; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        
        .people-list { max-height: 350px; overflow-y: auto; margin-bottom: 16px; }
        .person-card {
            background: #0f172a;
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            border-left: 4px solid #ff6b9d;
        }
        .person-card.nearby { border-left-color: #10b981; }
        .person-card.medium { border-left-color: #f59e0b; }
        .person-card.far { border-left-color: #ef4444; }
        .person-name { font-weight: bold; font-size: 1rem; }
        .person-distance { font-size: 0.7rem; margin-top: 5px; }
        .nearby .person-distance { color: #34d399; }
        .medium .person-distance { color: #fbbf24; }
        .far .person-distance { color: #fca5a5; }
        
        .chat-area {
            background: #0f172a;
            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
        }
        .chat-messages { max-height: 200px; overflow-y: auto; margin-bottom: 12px; font-size: 0.8rem; }
        .message { margin-bottom: 8px; padding: 8px 12px; border-radius: 16px; max-width: 85%; }
        .message.sent { background: #ff6b9d; margin-left: auto; }
        .message.received { background: #1e293b; }
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex: 1; background: #1e293b; border: none; border-radius: 40px; padding: 10px; color: white; }
        .input-area button { background: #ff6b9d; border: none; border-radius: 40px; padding: 10px 20px; color: white; cursor: pointer; }
        
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        .location-status { font-size: 0.7rem; text-align: center; margin-top: 12px; color: #86efac; }
        button { background: #ff6b9d; border: none; border-radius: 40px; padding: 12px 24px; color: white; font-size: 1rem; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>💕 LOVE CODE</h1>
            <p>📍 Shows REAL distance to people nearby</p>
        </div>

        <div class="status-bar">
            <div><span class="dot" id="statusDot"></span> <span id="statusText">Ready</span></div>
            <div>👥 <span id="peerCount">0</span> nearby</div>
            <div>📡 <span id="gpsStatus">No GPS</span></div>
        </div>

        <div class="people-list" id="peopleList">
            <div class="empty-state">💫 Click START to find people near you</div>
        </div>

        <div class="chat-area" id="chatArea" style="display: none;">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type message..." disabled>
                <button id="sendBtn" disabled>Send</button>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="startBtn" style="flex:1; background:#10b981;">📍 START & ALLOW GPS</button>
            <button id="stopBtn" style="flex:1; background:#ef4444;">⏹️ STOP</button>
        </div>

        <div class="location-status" id="locationStatus">
            💡 Click START, allow GPS, then ask a friend to do the same!
        </div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    // ============================================
    // LOVE CODE - REAL GPS DISTANCE DETECTION
    // Works on ANY network (mobile data, different WiFi)
    // Shows EXACT distance in meters
    // ============================================
    
    let peer = null;
    let myLocation = null;
    let myName = null;
    let peers = new Map();
    let isActive = false;
    let selectedPeerId = null;
    let watchId = null;
    
    // Generate random name
    const names = ['💕 SweetHeart', '💫 KindSoul', '✨ GentleSpirit', '🌸 LovelyDream', '⭐ BraveHeart', '🦋 SoftSoul', '🌙 CalmMind', '💖 WarmHeart'];
    myName = names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 100);
    
    // DOM elements
    const peopleListDiv = document.getElementById('peopleList');
    const chatArea = document.getElementById('chatArea');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusTextSpan = document.getElementById('statusText');
    const peerCountSpan = document.getElementById('peerCount');
    const gpsStatusSpan = document.getElementById('gpsStatus');
    const locationStatusSpan = document.getElementById('locationStatus');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    
    // Calculate distance between 2 GPS points (Haversine formula)
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000; // Earth radius in meters
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }
    
    // Get proximity category
    function getProximity(distanceMeters) {
        if (distanceMeters < 5) return { class: 'nearby', label: '🔥 VERY CLOSE! (<5m)', emoji: '💕' };
        if (distanceMeters < 10) return { class: 'nearby', label: `📱 ${distanceMeters.toFixed(0)}m away • Very Close`, emoji: '💚' };
        if (distanceMeters < 30) return { class: 'medium', label: `📍 ${distanceMeters.toFixed(0)}m away • Nearby`, emoji: '💛' };
        if (distanceMeters < 100) return { class: 'far', label: `📍 ${distanceMeters.toFixed(0)}m away • In Area`, emoji: '❤️' };
        return { class: 'far', label: `📍 ${distanceMeters.toFixed(0)}m away • Far`, emoji: '📡' };
    }
    
    // Update the people list UI
    function updatePeopleList() {
        const now = Date.now();
        const activePeers = Array.from(peers.entries())
            .filter(([_, data]) => data.location && (now - data.lastSeen) < 20000)
            .map(([id, data]) => ({ id, ...data }));
        
        // Sort by distance (closest first)
        activePeers.sort((a, b) => (a.distance || 999) - (b.distance || 999));
        
        peerCountSpan.innerText = activePeers.length;
        
        if (activePeers.length === 0) {
            peopleListDiv.innerHTML = `<div class="empty-state">
                🌟 No one nearby yet<br>
                <span style="font-size:0.7rem">Share this link with someone near you!</span>
            </div>`;
            return;
        }
        
        peopleListDiv.innerHTML = '';
        for (let peer of activePeers) {
            const proximity = getProximity(peer.distance);
            const div = document.createElement('div');
            div.className = `person-card ${proximity.class}`;
            div.innerHTML = `
                <div class="person-name">${proximity.emoji} ${escapeHtml(peer.name || 'Someone')}</div>
                <div class="person-distance">${proximity.label}</div>
            `;
            div.onclick = () => selectPeer(peer.id, peer.name);
            peopleListDiv.appendChild(div);
        }
    }
    
    function selectPeer(peerId, peerName) {
        selectedPeerId = peerId;
        chatArea.style.display = 'block';
        const peerData = peers.get(peerId);
        const distanceText = peerData?.distance ? getProximity(peerData.distance).label : 'nearby';
        chatMessagesDiv.innerHTML = `<div class="empty-state">💬 Chatting with ${escapeHtml(peerName)}<br><span style="font-size:0.65rem">${distanceText}</span></div>`;
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
    }
    
    function addChatMessage(msg, isSent, peerName = '') {
        const div = document.createElement('div');
        div.className = `message ${isSent ? 'sent' : 'received'}`;
        div.innerHTML = isSent ? `You: ${escapeHtml(msg)}` : `${escapeHtml(peerName)}: ${escapeHtml(msg)}`;
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function sendMessage() {
        if (!selectedPeerId) {
            locationStatusSpan.innerHTML = '👆 Tap on a person first to chat';
            return;
        }
        const msg = messageInput.value.trim();
        if (!msg) return;
        
        const peerData = peers.get(selectedPeerId);
        if (peerData && peerData.conn && peerData.conn.open) {
            peerData.conn.send({ type: 'CHAT', text: msg, from: myName });
            addChatMessage(msg, true);
            messageInput.value = '';
        } else {
            locationStatusSpan.innerHTML = '❌ Connection lost. Person may have left.';
        }
    }
    
    // Broadcast my location to all connected peers
    function broadcastLocation() {
        if (!peer || !myLocation) return;
        
        const locationPacket = {
            type: 'LOCATION',
            lat: myLocation.lat,
            lng: myLocation.lng,
            accuracy: myLocation.accuracy,
            name: myName,
            timestamp: Date.now()
        };
        
        for (let [peerId, data] of peers.entries()) {
            if (data.conn && data.conn.open) {
                try {
                    data.conn.send(locationPacket);
                } catch(e) {}
            }
        }
    }
    
    // Start GPS tracking
    function startGPS() {
        if (!navigator.geolocation) {
            locationStatusSpan.innerHTML = '❌ GPS not supported on this device';
            gpsStatusSpan.innerHTML = 'Not supported';
            return;
        }
        
        locationStatusSpan.innerHTML = '📍 Requesting GPS permission...';
        gpsStatusSpan.innerHTML = 'Requesting...';
        statusDot.className = 'dot yellow';
        
        watchId = navigator.geolocation.watchPosition(
            (position) => {
                myLocation = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                    accuracy: position.coords.accuracy
                };
                gpsStatusSpan.innerHTML = `✅ ${position.coords.accuracy.toFixed(0)}m`;
                locationStatusSpan.innerHTML = `✅ GPS active! Accuracy: ${position.coords.accuracy.toFixed(0)}m • ${myName}`;
                statusDot.className = 'dot green';
                statusTextSpan.innerText = 'Online';
                
                broadcastLocation();
                updateDistancesToPeers();
            },
            (error) => {
                let errorMsg = '';
                if (error.code === 1) errorMsg = '❌ GPS denied. Please allow location and refresh.';
                else if (error.code === 2) errorMsg = '❌ GPS unavailable. Try moving near a window.';
                else errorMsg = '❌ GPS error. Please check location settings.';
                locationStatusSpan.innerHTML = errorMsg;
                gpsStatusSpan.innerHTML = 'Denied';
                statusDot.className = 'dot red';
                statusTextSpan.innerText = 'GPS Needed';
            },
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
        );
    }
    
    // Calculate distances to all peers
    function updateDistancesToPeers() {
        if (!myLocation) return;
        
        let updated = false;
        for (let [peerId, data] of peers.entries()) {
            if (data.location) {
                const newDistance = calculateDistance(
                    myLocation.lat, myLocation.lng,
                    data.location.lat, data.location.lng
                );
                data.distance = newDistance;
                data.lastSeen = Date.now();
                updated = true;
            }
        }
        
        if (updated) {
            updatePeopleList();
            
            // Check for very close people
            for (let [peerId, data] of peers.entries()) {
                if (data.distance && data.distance < 10 && !data.notified) {
                    data.notified = true;
                    locationStatusSpan.innerHTML = `🎉 ${data.name} is VERY CLOSE (${data.distance.toFixed(0)}m)! Say hi!`;
                    setTimeout(() => {
                        if (locationStatusSpan.innerHTML.includes('Say hi')) {
                            locationStatusSpan.innerHTML = `✅ GPS active • ${myName}`;
                        }
                    }, 5000);
                }
            }
        }
    }
    
    // Setup WebRTC connection
    function setupConnection(conn, peerId) {
        peers.set(peerId, {
            conn: conn,
            name: null,
            location: null,
            distance: null,
            lastSeen: Date.now(),
            notified: false
        });
        
        conn.on('open', () => {
            if (myLocation) {
                conn.send({
                    type: 'LOCATION',
                    lat: myLocation.lat,
                    lng: myLocation.lng,
                    accuracy: myLocation.accuracy,
                    name: myName,
                    timestamp: Date.now()
                });
            }
        });
        
        conn.on('data', (data) => {
            if (data.type === 'LOCATION') {
                const peerData = peers.get(peerId);
                if (peerData) {
                    peerData.location = { lat: data.lat, lng: data.lng };
                    peerData.name = data.name;
                    peerData.lastSeen = Date.now();
                    if (myLocation) {
                        peerData.distance = calculateDistance(
                            myLocation.lat, myLocation.lng,
                            data.lat, data.lng
                        );
                        updatePeopleList();
                        locationStatusSpan.innerHTML = `✨ New person nearby: ${data.name} (${peerData.distance.toFixed(0)}m away)`;
                    }
                }
            } else if (data.type === 'CHAT' && selectedPeerId === peerId) {
                addChatMessage(data.text, false, data.from);
            }
        });
        
        conn.on('close', () => {
            const peerData = peers.get(peerId);
            const name = peerData?.name || 'Someone';
            peers.delete(peerId);
            updatePeopleList();
            if (selectedPeerId === peerId) {
                selectedPeerId = null;
                chatArea.style.display = 'none';
                locationStatusSpan.innerHTML = `👋 ${name} left`;
            }
        });
    }
    
    // Start PeerJS (works on any network!)
    function startPeerJS() {
        const id = `love-${Date.now()}-${Math.random().toString(36).substr(2, 8)}`;
        
        peer = new Peer(id, {
            debug: 0,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        });
        
        peer.on('open', () => {
            isActive = true;
            statusTextSpan.innerText = 'Online';
            locationStatusSpan.innerHTML = `✅ Connected! ${myName} • Waiting for GPS...`;
        });
        
        peer.on('connection', (conn) => {
            setupConnection(conn, conn.peer);
        });
        
        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                // Normal, ignore
            } else if (err.type === 'network') {
                locationStatusSpan.innerHTML = '⚠️ Network issue. Using mobile data? Try refreshing.';
            }
        });
    }
    
    // Stop everything
    function stopScan() {
        if (watchId) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
        if (peer) {
            peer.destroy();
            peer = null;
        }
        peers.clear();
        isActive = false;
        selectedPeerId = null;
        myLocation = null;
        chatArea.style.display = 'none';
        statusDot.className = 'dot red';
        statusTextSpan.innerText = 'Offline';
        gpsStatusSpan.innerHTML = 'Stopped';
        peopleListDiv.innerHTML = '<div class="empty-state">⏹️ Stopped. Click START to begin.</div>';
        locationStatusSpan.innerHTML = '💡 Click START, allow GPS, then ask a friend to do the same!';
    }
    
    // Start everything
    function startScan() {
        if (isActive) stopScan();
        startPeerJS();
        startGPS();
        
        // Update distances every 5 seconds
        setInterval(() => {
            if (myLocation && isActive) {
                updateDistancesToPeers();
                broadcastLocation();
            }
        }, 5000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // Event listeners
    startBtn.onclick = startScan;
    stopBtn.onclick = stopScan;
    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
